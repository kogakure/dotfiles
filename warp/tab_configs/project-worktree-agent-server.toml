name = "New Project Worktree (Agent + Server)"
title = "{{branch_name}}"
color = "green"

[[panes]]
id = "root"
split = "horizontal"
children = ["agent", "server"]

[[panes]]
id = "agent"
type = "terminal"
directory = "{{repo}}"
commands = [
    "WT=\"$HOME/.warp/worktrees/$(basename {{repo}})/{{branch_name}}\"; rmdir \"$WT\" 2>/dev/null; git worktree add -b {{branch_name}} \"$WT\" {{base_branch}} 2>/dev/null || git worktree add \"$WT\" {{branch_name}} 2>/dev/null || true",
    "cd $HOME/.warp/worktrees/$(basename {{repo}})/{{branch_name}}",
    "claude --dangerously-skip-permissions --chrome",
]
is_focused = true

[[panes]]
id = "server"
type = "terminal"
directory = "{{repo}}"
commands = [
    "WT=\"$HOME/.warp/worktrees/$(basename {{repo}})/{{branch_name}}\"; rmdir \"$WT\" 2>/dev/null; git worktree add -b {{branch_name}} \"$WT\" {{base_branch}} 2>/dev/null || git worktree add \"$WT\" {{branch_name}} 2>/dev/null || true",
    "cd $HOME/.warp/worktrees/$(basename {{repo}})/{{branch_name}}",
    "yarn",
    "yarn start:stage",
]

[params.repo]
type = "repo"
description = "Project directory"

[params.base_branch]
type = "branch"
description = "Base branch to branch from"

[params.branch_name]
type = "text"
description = "New branch/worktree name"
